<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TriForge AI</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at 50% 25%, #160a30 0%, #0a0a14 65%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── SVG forge animation ── */
    svg.forge {
      width: 480px;
      height: 215px;
      overflow: visible;
    }

    /* Outer triangle skeleton — faint dashed */
    .tri-frame {
      fill: none;
      stroke: rgba(99, 102, 241, 0.18);
      stroke-width: 0.8;
      stroke-dasharray: 5 9;
    }

    /* Energy beams: static glow layer + animated dash layer */
    .beam-static {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.35;
    }
    .beam-anim {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 5 11;
      opacity: 0.9;
      animation: flowBeam 1.4s linear infinite;
    }
    /* Per-AI beam colors */
    .c-claude  { stroke: #f97316; }
    .c-gpt     { stroke: #10b981; }
    .c-grok    { stroke: #6366f1; }

    /* AI node outer halos */
    .halo {
      fill-opacity: 0.12;
      stroke-width: 1;
      transform-box: fill-box;
      transform-origin: center;
      animation: haloPulse 2.2s ease-in-out infinite;
    }
    .halo.claude  { fill: #f97316; stroke: #f97316; }
    .halo.gpt     { fill: #10b981; stroke: #10b981; animation-delay: 0.73s; }
    .halo.grok    { fill: #6366f1; stroke: #6366f1; animation-delay: 1.47s; }

    /* AI node cores */
    .node {
      fill-opacity: 0.22;
      stroke-width: 1.5;
    }
    .node.claude  { fill: #f97316; stroke: #f97316; }
    .node.gpt     { fill: #10b981; stroke: #10b981; }
    .node.grok    { fill: #6366f1; stroke: #6366f1; }

    /* Node brand labels */
    .brand {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    /* Center forge ring */
    .forge-outer {
      fill: none;
      stroke: rgba(99,102,241,0.22);
      stroke-width: 1;
      transform-box: fill-box;
      transform-origin: center;
      animation: forgeOuter 2s ease-in-out infinite;
    }
    .forge-inner {
      fill: rgba(99,102,241,0.14);
      stroke: #818cf8;
      stroke-width: 1.8;
      transform-box: fill-box;
      transform-origin: center;
      animation: forgeInner 1.6s ease-in-out infinite;
    }

    /* ── Bottom text ── */
    .app-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 5px;
      margin-top: 6px;
      background: linear-gradient(90deg, #f97316 0%, #a78bfa 40%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 12px;
      color: #818cf8;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0.85;
    }

    /* Three-color loader dots matching the three AIs */
    .loader {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      animation: dotBounce 1.3s ease-in-out infinite;
    }
    .dot.d1 { background: #f97316; }
    .dot.d2 { background: #818cf8; animation-delay: 0.22s; }
    .dot.d3 { background: #6366f1; animation-delay: 0.44s; }
    .dot.d4 { background: #10b981; animation-delay: 0.66s; }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 1px;
    }

    /* ── Keyframes ── */
    @keyframes flowBeam {
      from { stroke-dashoffset: 16; }
      to   { stroke-dashoffset: 0;  }
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(1);    opacity: 0.35; }
      50%       { transform: scale(1.25); opacity: 0.7;  }
    }

    @keyframes forgeOuter {
      0%, 100% { transform: scale(1);    opacity: 0.35; }
      50%       { transform: scale(1.15); opacity: 0.7;  }
    }

    @keyframes forgeInner {
      0%, 100% { transform: scale(1);    opacity: 0.7; }
      50%       { transform: scale(1.08); opacity: 1.0; }
    }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.4; }
      30%           { transform: translateY(-9px); opacity: 1;   }
    }
  </style>
</head>
<body>

  <!--
    Triangle layout (inside viewBox 0 0 380 165):
      CLAUDE  — top center       (190, 22)  — orange
      GPT     — bottom-left      ( 85, 148) — teal
      GROK    — bottom-right     (295, 148) — indigo
      FORGE   — center           (190,  88) — indigo
  -->
  <svg class="forge" viewBox="0 0 380 165" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="f-orange" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-teal" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-blue" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-indigo" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- ── Outer triangle skeleton ── -->
    <polygon class="tri-frame" points="190,22 85,148 295,148"/>

    <!-- ── Energy beams (node → forge center) ── -->
    <!-- CLAUDE top (190,22) → center (190,88): beam from edge of node to edge of forge -->
    <line class="beam-static c-claude" x1="190" y1="36"  x2="190" y2="74"/>
    <line class="beam-anim   c-claude" x1="190" y1="36"  x2="190" y2="74"/>

    <!-- GPT bottom-left (85,148) → center (190,88) -->
    <line class="beam-static c-gpt"    x1="98"  y1="139" x2="179" y2="96"/>
    <line class="beam-anim   c-gpt"    x1="98"  y1="139" x2="179" y2="96"/>

    <!-- GROK bottom-right (295,148) → center (190,88) -->
    <line class="beam-static c-grok" x1="282" y1="139" x2="201" y2="96"/>
    <line class="beam-anim   c-grok" x1="282" y1="139" x2="201" y2="96"/>

    <!-- ── CLAUDE node — top ── -->
    <circle class="halo claude" cx="190" cy="22" r="22"/>
    <circle class="node claude" cx="190" cy="22" r="13" filter="url(#f-orange)"/>
    <!-- Icon letter inside -->
    <text x="190" y="27" text-anchor="middle" font-size="11" font-weight="800"
          fill="#f97316" filter="url(#f-orange)">C</text>
    <!-- Label outside above -->
    <text x="190" y="8" text-anchor="middle" class="brand" fill="#fb923c">CLAUDE</text>

    <!-- ── GPT node — bottom-left ── -->
    <circle class="halo gpt" cx="85" cy="148" r="22"/>
    <circle class="node gpt"  cx="85" cy="148" r="13" filter="url(#f-teal)"/>
    <text x="85" y="153" text-anchor="middle" font-size="11" font-weight="800"
          fill="#10b981" filter="url(#f-teal)">G</text>
    <text x="42" y="158" text-anchor="middle" class="brand" fill="#34d399">GPT</text>

    <!-- ── GROK node — bottom-right ── -->
    <circle class="halo grok" cx="295" cy="148" r="22"/>
    <circle class="node grok" cx="295" cy="148" r="13" filter="url(#f-blue)"/>
    <text x="295" y="153" text-anchor="middle" font-size="11" font-weight="800"
          fill="#6366f1" filter="url(#f-blue)">X</text>
    <text x="337" y="158" text-anchor="middle" class="brand" fill="#818cf8">GROK</text>

    <!-- ── Center forge ── -->
    <circle class="forge-outer" cx="190" cy="88" r="38"/>
    <circle class="forge-inner" cx="190" cy="88" r="26" filter="url(#f-indigo)"/>
    <!-- Lightning bolt ⚡ -->
    <text x="190" y="98" text-anchor="middle" font-size="28"
          filter="url(#f-indigo)" style="filter:drop-shadow(0 0 8px rgba(255,210,60,0.9))">⚡</text>
  </svg>

  <div class="app-name">TriForge AI</div>
  <div class="tagline">Three minds. One verified result.</div>

  <div class="loader">
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>
  </div>

  <div class="version">v1.8.0</div>

  <script>
    // ── TriForge forge sound via Web Audio API ──────────────────────────────────
    // Narrative: three AI tones power up → converge → forge strike → resonant hum → close
    // No external files. Hard 3.4s fallback closes splash if audio fails.
    (function () {
      var hardClose = setTimeout(function () { window.close(); }, 3400);

      function closeSplash() {
        clearTimeout(hardClose);
        window.close();
      }

      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) { closeSplash(); return; }
        var ctx = new AudioCtx();
        var t = ctx.currentTime + 0.08;

        // ── Helper: oscillator with linear attack/release envelope ──────────────
        function osc(type, freqStart, freqEnd, startT, dur, peak, attack) {
          var o = ctx.createOscillator();
          var g = ctx.createGain();
          o.type = type;
          o.frequency.setValueAtTime(freqStart, startT);
          if (freqEnd !== freqStart) {
            o.frequency.linearRampToValueAtTime(freqEnd, startT + dur);
          }
          g.gain.setValueAtTime(0, startT);
          g.gain.linearRampToValueAtTime(peak, startT + (attack || 0.25));
          g.gain.linearRampToValueAtTime(0, startT + dur);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(startT);
          o.stop(startT + dur + 0.05);
        }

        // ── Helper: band-filtered white noise burst (electrical crackle) ────────
        function crackle(startT, dur, vol, filterHz) {
          var n    = Math.ceil(ctx.sampleRate * dur);
          var buf  = ctx.createBuffer(1, n, ctx.sampleRate);
          var data = buf.getChannelData(0);
          for (var i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
          var src  = ctx.createBufferSource();
          var filt = ctx.createBiquadFilter();
          var gain = ctx.createGain();
          filt.type = 'bandpass';
          filt.frequency.value = filterHz || 1400;
          filt.Q.value = 0.6;
          gain.gain.setValueAtTime(vol, startT);
          gain.gain.exponentialRampToValueAtTime(0.001, startT + dur);
          src.buffer = buf;
          src.connect(filt);
          filt.connect(gain);
          gain.connect(ctx.destination);
          src.start(startT);
          src.stop(startT + dur + 0.05);
        }

        // ── Phase 1 (0.0 – 0.9s): Three AI nodes power up, staggered ────────────
        // Claude  — warm orange  — 440 Hz, converging to 520 Hz
        osc('sine', 440, 520, t,        0.90, 0.18, 0.30);
        // GPT     — cool teal   — 528 Hz, converging to 520 Hz
        osc('sine', 528, 520, t + 0.13, 0.82, 0.18, 0.24);
        // Grok    — indigo      — 396 Hz, converging to 520 Hz
        osc('sine', 396, 520, t + 0.27, 0.75, 0.18, 0.20);

        // ── Phase 2 (0.7 – 1.05s): Sub-bass surge — forge charging ───────────────
        osc('sine', 55, 110, t + 0.70, 0.40, 0.28, 0.18);

        // ── Phase 3 (1.05s): Forge strike — impact bass + electrical crackle ─────
        osc('sawtooth', 110, 55, t + 1.05, 0.55, 0.22, 0.02);
        crackle(t + 1.05, 0.38, 0.40, 1600);
        crackle(t + 1.10, 0.22, 0.22, 800);

        // ── Phase 4 (1.12 – 2.6s): Resonant forge hum — harmonic triad fades ────
        osc('sine', 240, 240, t + 1.12, 1.40, 0.24, 0.10);
        osc('sine', 480, 480, t + 1.15, 1.20, 0.13, 0.10);
        osc('sine', 720, 720, t + 1.18, 0.95, 0.07, 0.12);

        // Close after the hum fades (~2.7s total from start)
        setTimeout(closeSplash, 2750);

      } catch (e) {
        closeSplash();
      }
    })();
  </script>
</body>
</html>
