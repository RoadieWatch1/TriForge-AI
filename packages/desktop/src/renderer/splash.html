<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TriForge AI</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at 50% 25%, #160a30 0%, #0a0a14 65%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── SVG forge animation ── */
    svg.forge {
      width: 380px;
      height: 170px;
      overflow: visible;
    }

    /* Outer triangle skeleton — faint dashed */
    .tri-frame {
      fill: none;
      stroke: rgba(99, 102, 241, 0.18);
      stroke-width: 0.8;
      stroke-dasharray: 5 9;
    }

    /* Energy beams: static glow layer + animated dash layer */
    .beam-static {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.35;
    }
    .beam-anim {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 5 11;
      opacity: 0.9;
      animation: flowBeam 1.4s linear infinite;
    }
    /* Per-AI beam colors */
    .c-claude  { stroke: #f97316; }
    .c-gpt     { stroke: #10b981; }
    .c-gemini  { stroke: #3b82f6; }

    /* AI node outer halos */
    .halo {
      fill-opacity: 0.12;
      stroke-width: 1;
      transform-box: fill-box;
      transform-origin: center;
      animation: haloPulse 2.2s ease-in-out infinite;
    }
    .halo.claude  { fill: #f97316; stroke: #f97316; }
    .halo.gpt     { fill: #10b981; stroke: #10b981; animation-delay: 0.73s; }
    .halo.gemini  { fill: #3b82f6; stroke: #3b82f6; animation-delay: 1.47s; }

    /* AI node cores */
    .node {
      fill-opacity: 0.22;
      stroke-width: 1.5;
    }
    .node.claude  { fill: #f97316; stroke: #f97316; }
    .node.gpt     { fill: #10b981; stroke: #10b981; }
    .node.gemini  { fill: #3b82f6; stroke: #3b82f6; }

    /* Node brand labels */
    .brand {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    /* Center forge ring */
    .forge-outer {
      fill: none;
      stroke: rgba(99,102,241,0.22);
      stroke-width: 1;
      transform-box: fill-box;
      transform-origin: center;
      animation: forgeOuter 2s ease-in-out infinite;
    }
    .forge-inner {
      fill: rgba(99,102,241,0.14);
      stroke: #818cf8;
      stroke-width: 1.8;
      transform-box: fill-box;
      transform-origin: center;
      animation: forgeInner 1.6s ease-in-out infinite;
    }

    /* ── Bottom text ── */
    .app-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-top: 2px;
      background: linear-gradient(90deg, #f97316 0%, #a78bfa 40%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 10px;
      color: #818cf8;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-top: 5px;
      opacity: 0.85;
    }

    /* Three-color loader dots matching the three AIs */
    .loader {
      display: flex;
      gap: 9px;
      margin-top: 18px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: dotBounce 1.3s ease-in-out infinite;
    }
    .dot.d1 { background: #f97316; }
    .dot.d2 { background: #818cf8; animation-delay: 0.22s; }
    .dot.d3 { background: #3b82f6; animation-delay: 0.44s; }
    .dot.d4 { background: #10b981; animation-delay: 0.66s; }

    .version {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 1px;
    }

    /* ── Keyframes ── */
    @keyframes flowBeam {
      from { stroke-dashoffset: 16; }
      to   { stroke-dashoffset: 0;  }
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(1);    opacity: 0.35; }
      50%       { transform: scale(1.25); opacity: 0.7;  }
    }

    @keyframes forgeOuter {
      0%, 100% { transform: scale(1);    opacity: 0.35; }
      50%       { transform: scale(1.15); opacity: 0.7;  }
    }

    @keyframes forgeInner {
      0%, 100% { transform: scale(1);    opacity: 0.7; }
      50%       { transform: scale(1.08); opacity: 1.0; }
    }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.4; }
      30%           { transform: translateY(-9px); opacity: 1;   }
    }
  </style>
</head>
<body>

  <!--
    Triangle layout (inside viewBox 0 0 380 165):
      CLAUDE  — top center       (190, 22)  — orange
      GPT     — bottom-left      ( 85, 148) — teal
      GEMINI  — bottom-right     (295, 148) — blue
      FORGE   — center           (190,  88) — indigo
  -->
  <svg class="forge" viewBox="0 0 380 165" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="f-orange" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-teal" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-blue" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="f-indigo" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- ── Outer triangle skeleton ── -->
    <polygon class="tri-frame" points="190,22 85,148 295,148"/>

    <!-- ── Energy beams (node → forge center) ── -->
    <!-- CLAUDE top (190,22) → center (190,88): beam from edge of node to edge of forge -->
    <line class="beam-static c-claude" x1="190" y1="36"  x2="190" y2="74"/>
    <line class="beam-anim   c-claude" x1="190" y1="36"  x2="190" y2="74"/>

    <!-- GPT bottom-left (85,148) → center (190,88) -->
    <line class="beam-static c-gpt"    x1="98"  y1="139" x2="179" y2="96"/>
    <line class="beam-anim   c-gpt"    x1="98"  y1="139" x2="179" y2="96"/>

    <!-- GEMINI bottom-right (295,148) → center (190,88) -->
    <line class="beam-static c-gemini" x1="282" y1="139" x2="201" y2="96"/>
    <line class="beam-anim   c-gemini" x1="282" y1="139" x2="201" y2="96"/>

    <!-- ── CLAUDE node — top ── -->
    <circle class="halo claude" cx="190" cy="22" r="22"/>
    <circle class="node claude" cx="190" cy="22" r="13" filter="url(#f-orange)"/>
    <!-- Icon letter inside -->
    <text x="190" y="27" text-anchor="middle" font-size="11" font-weight="800"
          fill="#f97316" filter="url(#f-orange)">C</text>
    <!-- Label outside above -->
    <text x="190" y="8" text-anchor="middle" class="brand" fill="#fb923c">CLAUDE</text>

    <!-- ── GPT node — bottom-left ── -->
    <circle class="halo gpt" cx="85" cy="148" r="22"/>
    <circle class="node gpt"  cx="85" cy="148" r="13" filter="url(#f-teal)"/>
    <text x="85" y="153" text-anchor="middle" font-size="11" font-weight="800"
          fill="#10b981" filter="url(#f-teal)">G</text>
    <text x="42" y="158" text-anchor="middle" class="brand" fill="#34d399">GPT</text>

    <!-- ── GEMINI node — bottom-right ── -->
    <circle class="halo gemini" cx="295" cy="148" r="22"/>
    <circle class="node gemini" cx="295" cy="148" r="13" filter="url(#f-blue)"/>
    <text x="295" y="153" text-anchor="middle" font-size="11" font-weight="800"
          fill="#3b82f6" filter="url(#f-blue)">G</text>
    <text x="337" y="158" text-anchor="middle" class="brand" fill="#60a5fa">GEMINI</text>

    <!-- ── Center forge ── -->
    <circle class="forge-outer" cx="190" cy="88" r="38"/>
    <circle class="forge-inner" cx="190" cy="88" r="26" filter="url(#f-indigo)"/>
    <!-- Lightning bolt ⚡ -->
    <text x="190" y="98" text-anchor="middle" font-size="28"
          filter="url(#f-indigo)" style="filter:drop-shadow(0 0 8px rgba(255,210,60,0.9))">⚡</text>
  </svg>

  <div class="app-name">TriForge AI</div>
  <div class="tagline">Forging Three Minds Into One</div>

  <div class="loader">
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>
  </div>

  <div class="version">v0.0.1</div>
</body>
</html>
