name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS build (arm64 DMG) ─────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_COMPRESSION_LEVEL: '0'
          # Notarization — set these secrets in GitHub → Settings → Secrets.
          # If not set, notarize.js skips silently and produces an unsigned DMG.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: packages/desktop/dist/*.dmg

  # ── Windows build (x64 NSIS installer) ─────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-setup
          path: packages/desktop/dist/*.exe

  # ── Create GitHub Release (runs after both builds succeed) ──────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist

      - name: Download Win artifact
        uses: actions/download-artifact@v4
        with:
          name: win-setup
          path: dist

      - name: List files to release
        run: ls -lh dist/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
