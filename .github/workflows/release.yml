name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS build (universal DMG) ──────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync app version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/desktop
          npm version "$VERSION" --no-git-tag-version

      # electron-builder v25 expects APPLE_API_KEY to be a FILE PATH, not file
      # contents. Write the secret to a temp .p8 file and export its path so
      # electron-builder's built-in notarization picks it up correctly.
      - name: Write notarization key to temp file
        if: ${{ env.APPLE_API_KEY_CONTENT != '' }}
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/notarization_key.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_FILE"
          echo "APPLE_API_KEY=$KEY_FILE" >> $GITHUB_ENV

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_COMPRESSION_LEVEL: '0'
          # APPLE_API_KEY is set via GITHUB_ENV above (as a file path)
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.yml
            packages/desktop/dist/*.blockmap

  # ── Windows build (x64 NSIS installer) ─────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync app version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/desktop
          npm version "$VERSION" --no-git-tag-version

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Win artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-setup
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.yml
            packages/desktop/dist/*.blockmap

  # ── Create GitHub Release (runs after both builds succeed) ──────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist

      - name: Download Win artifact
        uses: actions/download-artifact@v4
        with:
          name: win-setup
          path: dist

      - name: List files to release
        run: ls -lh dist/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
