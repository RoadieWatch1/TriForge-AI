name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── macOS build (arm64 DMG) ─────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable signing — add MAC_CERTS secret and remove these two lines when cert is ready
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_COMPRESSION_LEVEL: '0'

  # ── Windows build (x64 NSIS installer) ─────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:desktop

      - name: Package (electron-builder)
        working-directory: packages/desktop
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable signing — add WIN_CERTS secret and remove these two lines when cert is ready
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
